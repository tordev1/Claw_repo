# PROJECT-CLAW Docker Compose
# Production-ready configuration

version: '3.8'

services:
  # Backend API Server
  api:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    container_name: claw-api
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3001
      - HOST=0.0.0.0
      - DB_TYPE=${DB_TYPE:-sqlite}
      - DB_PATH=/app/data/project-claw.db
      - DATABASE_URL=${DATABASE_URL}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY=${JWT_EXPIRY:-24h}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-100}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-1 minute}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENABLE_WEBSOCKETS=${ENABLE_WEBSOCKETS:-true}
      - ENABLE_RATE_LIMITING=${ENABLE_RATE_LIMITING:-true}
    volumes:
      - api-data:/app/data
    networks:
      - claw-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Frontend Web HQ
  web:
    build:
      context: ./web-hq
      dockerfile: Dockerfile
    container_name: claw-web
    ports:
      - "${WEB_PORT:-80}:80"
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
      - VITE_API_URL=${VITE_API_URL:-http://localhost:3001}
      - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:3001/ws}
    networks:
      - claw-network
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # PostgreSQL Database (for production use)
  # Start with: DB_TYPE=postgresql docker compose up
  db:
    image: postgres:15-alpine
    container_name: claw-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-projectclaw}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-project_claw}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - claw-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-projectclaw}"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - postgres

  # Optional: Redis for rate limiting (high-traffic deployments)
  # redis:
  #   image: redis:7-alpine
  #   container_name: claw-redis
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - claw-network
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  api-data:
    driver: local
  postgres-data:
    driver: local
  # redis-data:
  #   driver: local

networks:
  claw-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
